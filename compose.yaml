---
services:
  adminer:
    image: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
  php:
    image: ${IMAGES_PREFIX}app-php
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME}
      SYMFONY_VERSION: ${SYMFONY_VERSION}
      STABILITY: ${STABILITY}
    # Charge .env puis .env.dev pour que Caddy et Symfony aient accès
    # aux variables sensibles (MERCURE_*JWT*, DATABASE_URL, etc.) en tant
    # que vraies variables d'environnement OS (nécessaire pour le Caddyfile).
    env_file:
      - .env
      - path: .env.dev
        required: false
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT}
        protocol: udp

# Mercure is installed as a Caddy module, prevent the Flex recipe from installing another service
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION}-alpine
    # Les variables POSTGRES_* sont chargées directement depuis .env.dev
    env_file:
      - .env
      - path: .env.dev
        required: false
    healthcheck:
      # pg_isready sans args : vérifie juste que PostgreSQL accepte des connexions
      test: ["CMD", "pg_isready"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  caddy_data:
  caddy_config:
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
