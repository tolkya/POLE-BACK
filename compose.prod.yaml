---
# Production environment override
# Usage : docker compose -f compose.yaml -f compose.prod.yaml up -d
services:

  # Adminer désactivé en production
  adminer:
    profiles:
      - dev

  php:
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_ENV: prod
      # APP_SECRET, MERCURE_*_JWT_KEY, etc. sont fournis par env_file (.env + .env.dev)
      # Ne PAS les mettre ici avec ${…} : l'interpolation Compose lit uniquement .env (vide),
      # ce qui écraserait les bonnes valeurs chargées par env_file.
    restart: unless-stopped

  database:
    restart: unless-stopped
