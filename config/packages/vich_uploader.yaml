vich_uploader:
    db_driver: orm

    mappings:
        skill_media_tuto:
            uri_prefix: /media/skills/tuto
            upload_destination: '%kernel.project_dir%/public/media/skills/tuto'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        club_logo:
            uri_prefix: /media/clubs/logos
            upload_destination: '%kernel.project_dir%/public/media/clubs/logos'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
